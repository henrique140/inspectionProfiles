<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amor Isadora (DEBUG) 💗</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0710; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #wrap { position: relative; width: 100%; height: 100%; }
    #hud {
      position: absolute; left: 10px; top: 10px; z-index: 10;
      color: rgba(255,255,255,0.95);
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 12px;
      border-radius: 12px;
      max-width: calc(100vw - 20px);
      font-size: 13px;
      line-height: 1.25;
      user-select: none;
      pointer-events: none;
      backdrop-filter: blur(6px);
      white-space: pre-wrap;
    }
    #hud strong { color: #ff79c7; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="wrap"></div>
  <div id="hud"></div>

  <script type="module">
    const hud = document.getElementById('hud');
    const wrap = document.getElementById('wrap');

    function log(msg) {
      hud.textContent = msg + (hud.textContent ? "\n\n" + hud.textContent : "");
    }

    // Captura erros pra mostrar por que "fica tudo petra"
    window.addEventListener('error', (e) => {
      log("❌ Erro JS:\n" + (e.message || e.error?.message || String(e)));
    });

    window.addEventListener('unhandledrejection', (e) => {
      log("❌ Erro Promise:\n" + (e.reason?.message || String(e.reason)));
    });

    log("⏳ Carregando Three.js e cena...");

    let THREE;
    try {
      THREE = await import('https://unpkg.com/three@0.160.0/build/three.module.js');
    } catch (err) {
      log("❌ Falha ao carregar módulos CDN.\n" + err);
      throw err;
    }

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0b0710, 0.035);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0b0710, 1);
    wrap.appendChild(renderer.domElement);

    // Sem OrbitControls para evitar problemas com módulos (o debug roda com animação automática).


    scene.add(new THREE.AmbientLight(0xff6fb1, 0.35));
    const d1 = new THREE.DirectionalLight(0xff4fa0, 1.2);
    d1.position.set(3, 4, 5);
    scene.add(d1);

    // Um coração SIMPLES e grande o suficiente para aparecer
    function heartShapePoints(scale = 1) {
      const pts = [];
      const steps = 220;
      for (let i = 0; i <= steps; i++) {
        const t = (i / steps) * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        pts.push(new THREE.Vector2(x * scale, -y * scale));
      }
      return pts;
    }

    const heart2D = new THREE.Shape(heartShapePoints(0.08));
    const geometry = new THREE.ExtrudeGeometry(heart2D, {
      depth: 1.1,
      bevelEnabled: true,
      bevelThickness: 0.25,
      bevelSize: 0.15,
      bevelSegments: 8,
      steps: 2
    });
    geometry.center();

    const material = new THREE.MeshStandardMaterial({
      color: 0xff3ea5,
      emissive: 0x8f0049,
      emissiveIntensity: 0.6,
      roughness: 0.35,
      metalness: 0.05
    });

    const heart = new THREE.Mesh(geometry, material);
    heart.position.set(0, -0.5, 0);
    scene.add(heart);

    // Base (algo sólido)
    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(2.4, 2.4, 0.35, 64),
      new THREE.MeshStandardMaterial({ color: 0xff77c7, emissive: 0x330018, emissiveIntensity: 0.2, roughness: 0.7 })
    );
    base.position.set(0, -1.65, 0);
    scene.add(base);

    log("✅ CDN carregado.\n✅ Render WebGL criado.\nToque/arraste para girar.\nSe ficar preto, tem erro de WebGL no navegador.");

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;

      const beat = 1 + 0.12 * Math.sin(t * 2.8);
      heart.scale.set(beat, beat, beat);
      heart.rotation.y += 0.01;
      heart.rotation.x = -0.15 + 0.04 * Math.sin(t * 1.6);

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
